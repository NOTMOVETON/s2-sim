          color: "#FF0000"
          duration: 5.0

        - type: "trajectory_recorder"
          record_interval_s: 0.2
          max_points: 300
          color: "#FFAA00"

        - type: "path_display"
          topic: "/plan"
          color: "#00FF88"

    # Robot 2 — обычный, domain 52
