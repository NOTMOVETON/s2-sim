          max_angular: 1.5

        - type: "gnss"
          noise_std: 0.3
          publish_rate_hz: 10

        - type: "joint_vel"
          topic: "/cmd_vel_mount"
          publish_rate_hz: 50
          joints:
            - name: "arm"
              axis: "linear_x"
              max_vel: 1.0
            - name: "bucket"
              axis: "angular_z"
              max_vel: 1.0

        - type: "color"
