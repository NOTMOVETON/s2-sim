        bounding:
          type: "sphere"
          radius: 0.4
      visual:
        type: "box"
        size: [0.8, 0.5, 0.3]
        color: "#FF6B35"
      plugins:
        - type: "diff_drive"
          max_linear: 2.0
          max_angular: 1.5

    - name: "robot_1"
      id: 1
      domain_id: 51
      pose: {x: 3.0, y: 0.0, z: 0.0, yaw: 0.0}
