        bounding:
          type: "sphere"
          radius: 0.4
      visual:
        type: "box"
        size: [0.8, 0.5, 0.3]
        color: "#35A0FF"
      plugins:
        - type: "diff_drive"
          max_linear: 2.0
          max_angular: 1.5

    - name: "robot_2"
      id: 2
