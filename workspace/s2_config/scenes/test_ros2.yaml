s2:
  update_rate: 100
  viz_rate: 30

  world:
    surface: "flat"
    geo_origin: {lat: 55.75, lon: 37.62, alt: 150.0}

    geometry:
      # Пол
      - type: "box"
        pose: {x: 0.0, y: 0.0, z: -0.05, yaw: 0.0}
        size: {x: 50.0, y: 50.0, z: 0.1}
        color: "#444444"

  agents:
    - name: "robot_0"
      id: 0
      domain_id: 50
      pose: {x: 0.0, y: 0.0, z: 0.0, yaw: 0.0}
