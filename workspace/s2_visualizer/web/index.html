<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>S2 Simulator</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { overflow: hidden; background: #1a1a2e; }
        canvas { display: block; }

        /* Информационный блок (top-left) */
        #info-panel {
            position: fixed;
            top: 12px;
            left: 12px;
            background: rgba(0, 0, 0, 0.75);
            color: #e0e0e0;
            font-family: 'Courier New', monospace;
            font-size: 13px;
            padding: 10px 14px;
            border-radius: 6px;
            z-index: 100;
            min-width: 200px;
            pointer-events: none;
        }
        #info-panel .label { color: #888; }
        #info-panel .value { color: #fff; font-weight: bold; }
        #info-panel .connected { color: #4caf50; }
        #info-panel .disconnected { color: #f44336; }

        /* Панель управления (top-center) */
        #control-panel {
            position: fixed;
            top: 12px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.75);
            padding: 8px 14px;
            border-radius: 6px;
            z-index: 100;
            display: flex;
            gap: 8px;
            user-select: none;
        }
        #control-panel button {
            background: #333;
            color: #fff;
            border: 1px solid #555;
            padding: 8px 16px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
            font-family: 'Courier New', monospace;
            transition: background 0.15s;
        }
        #control-panel button:hover { background: #555; }
        #control-panel button:active { background: #777; }
        #control-panel button.active { background: #4caf50; border-color: #4caf50; }

        /* Боковая панель робота (left, под info-panel) */
        #side-panel {
            position: fixed;
            top: calc(100px + 16px); /* Height info-panel + gap */
            left: 12px;
            width: 320px;
            max-height: calc(100vh - 140px);
            background: rgba(0, 0, 0, 0.9);
            color: #e0e0e0;
            font-family: 'Courier New', monospace;
            font-size: 13px;
            border-radius: 6px;
            padding: 14px;
            z-index: 101;
            overflow-y: auto;
            display: none;
        }
        #side-panel.visible { display: block; }
        #side-panel h3 {
            margin: 0 0 10px 0;
            color: #fff;
            font-size: 15px;
            border-bottom: 1px solid #444;
            padding-bottom: 6px;
        }
        #side-panel .section {
            margin-bottom: 12px;
        }
        #side-panel .section-title {
            color: #888;
            font-size: 11px;
            text-transform: uppercase;
            margin-bottom: 4px;
        }
        #side-panel .row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 2px;
        }
        #side-panel .row .label { color: #999; }
        #side-panel .row .value { color: #fff; }
        #side-panel button.close-btn {
            background: #c0392b;
            color: #fff;
            border: none;
            padding: 4px 10px;
            border-radius: 3px;
            cursor: pointer;
            font-size: 12px;
            margin-top: 8px;
            float: right;
        }
        #side-panel button.follow-btn {
            background: #2980b9;
            color: #fff;
            border: none;
            padding: 6px 12px;
            border-radius: 3px;
            cursor: pointer;
            font-size: 13px;
            width: 100%;
            margin-top: 4px;
        }
        #side-panel button.follow-btn.following {
            background: #27ae60;
        }

        /* Аккордеон плагинов */
        #plugin-container {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }
        .plugin-accordion {
            border: 1px solid #3a3a4e;
            border-radius: 3px;
            overflow: hidden;
        }
        .plugin-header {
            background: #2a2a3e;
            color: #fff;
            padding: 8px 12px;
            cursor: pointer;
            font-size: 13px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            user-select: none;
        }
        .plugin-header:hover {
            background: #3a3a4e;
        }
        .plugin-header .arrow {
            transition: transform 0.2s;
            display: inline-block;
            font-size: 10px;
        }
        .plugin-header.open .arrow {
            transform: rotate(90deg);
        }
        .plugin-content {
            background: #1a1a2e;
            padding: 0 8px;
            font-size: 11px;
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.3s ease, padding 0.3s ease;
            white-space: pre;
            color: #ccc;
        }
        .plugin-content.open {
            max-height: 300px;
            padding: 8px;
            overflow-y: auto;
        }

        /* Кнопка входа плагина (⚙️) */
        .plugin-input-btn {
            background: #2980b9;
            color: #fff;
            border: none;
            border-radius: 3px;
            padding: 2px 6px;
            cursor: pointer;
            font-size: 14px;
            transition: background 0.15s;
        }
        .plugin-input-btn:hover {
            background: #3498db;
        }

        /* Форма ввода плагина */
        .plugin-input-form {
            background: #12122a;
            border-top: 1px solid #3a3a4e;
            padding: 8px 12px;
        }
        .plugin-input-form-inner {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            align-items: flex-end;
        }
        .form-field {
            display: flex;
            flex-direction: column;
            gap: 2px;
        }
        .form-field label {
            font-size: 11px;
            color: #999;
        }
        .form-field input[type="number"] {
            background: #2a2a3e;
            border: 1px solid #444;
            color: #fff;
            padding: 4px 8px;
            border-radius: 3px;
            width: 100px;
            font-size: 12px;
            font-family: 'Courier New', monospace;
        }
        .form-field input[type="number"]:focus {
            outline: none;
            border-color: #3498db;
        }
        .plugin-send-btn {
            background: #27ae60;
            color: #fff;
            border: none;
            padding: 6px 14px;
            border-radius: 3px;
            cursor: pointer;
            font-size: 12px;
            font-family: 'Courier New', monospace;
            transition: background 0.15s;
        }
        .plugin-send-btn:hover {
            background: #2ecc71;
        }
        .plugin-stop-btn {
            background: #c0392b;
            color: #fff;
            border: none;
            padding: 6px 14px;
            border-radius: 3px;
            cursor: pointer;
            font-size: 12px;
            font-family: 'Courier New', monospace;
            transition: background 0.15s;
        }
        .plugin-stop-btn:hover {
            background: #e74c3c;
        }

        /* TF Frames checkbox */
        .tf-toggle {
            display: flex;
            align-items: center;
            gap: 6px;
            margin-top: 6px;
            cursor: pointer;
        }
        .tf-toggle input[type="checkbox"] {
            cursor: pointer;
        }
        .tf-toggle label {
            cursor: pointer;
            font-size: 12px;
            color: #ccc;
        }
    </style>
</head>
<body>
    <div id="info-panel">
        <div><span class="label">Connection: </span><span id="conn-status" class="disconnected">Disconnected</span></div>
        <div><span class="label">Sim Time: </span><span id="sim-time" class="value">0.00s</span></div>
        <div><span class="label">Agents: </span><span id="agent-count" class="value">0</span></div>
        <div><span class="label">Actors: </span><span id="actor-count" class="value">0</span></div>
        <div><span class="label">FPS: </span><span id="fps" class="value">0</span></div>
        <div id="pause-indicator" style="color: #f39c12; font-weight: bold; margin-top: 4px; display: none;">⏸ PAUSED</div>
    </div>

    <!-- Панель управления -->
    <div id="control-panel">
        <button id="btn-play" onclick="sendCommand('resume')">▶ Play</button>
        <button id="btn-pause" onclick="sendCommand('pause')">⏸ Pause</button>
        <button id="btn-reset" onclick="sendCommand('reset')">🔄 Reset</button>
        <button id="btn-transform" onclick="toggleTransformMode()" style="margin-left: 8px;">Mode: Translate</button>
        <button id="btn-gizmo" onclick="toggleTransformControls()" style="margin-left: 8px;">Axes: ON</button>
    </div>

    <!-- Боковая панель робота -->
    <div id="side-panel">
        <h3 id="side-agent-title">Agent</h3>
        
        <div class="section">
            <div class="section-title">Метаинформация</div>
            <div class="row"><span class="label">ID:</span><span class="value" id="sp-agent-id">-</span></div>
            <div class="row"><span class="label">Name:</span><span class="value" id="sp-agent-name">-</span></div>
        </div>

        <div class="section">
            <div class="section-title">Текущее состояние</div>
            <div class="row"><span class="label">X:</span><span class="value" id="sp-pos-x">0.00</span></div>
            <div class="row"><span class="label">Y:</span><span class="value" id="sp-pos-y">0.00</span></div>
            <div class="row"><span class="label">Z:</span><span class="value" id="sp-pos-z">0.00</span></div>
            <div class="row"><span class="label">Yaw:</span><span class="value" id="sp-yaw">0.00</span></div>
            <div class="row"><span class="label">Vx:</span><span class="value" id="sp-vx">0.00</span></div>
            <div class="row"><span class="label">Vy:</span><span class="value" id="sp-vy">0.00</span></div>
            <div class="row"><span class="label">Wz:</span><span class="value" id="sp-wz">0.00</span></div>
        </div>

        <div class="section">
            <div class="section-title">Режим слежения</div>
            <button class="follow-btn" id="btn-follow" onclick="toggleFollow()">Follow</button>
            <div class="tf-toggle">
                <input type="checkbox" id="tf-frames-toggle" />
                <label for="tf-frames-toggle">Show TF frames</label>
            </div>
        </div>

        <div class="section">
            <div class="section-title">Плагины</div>
            <div id="plugin-container">
                <div style="color: #666; font-size: 12px;">нет данных</div>
            </div>
        </div>

        <button class="close-btn" onclick="closeSidePanel()">✕ Закрыть</button>
        <div style="clear: both;"></div>
    </div>

    <script type="importmap">
    {
        "imports": {
            "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
            "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
        }
    }
    </script>
    <script type="module" src="js/app.js"></script>
</body>
</html>
